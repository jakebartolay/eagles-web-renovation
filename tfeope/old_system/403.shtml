<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 - Forbidden</title>

<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:#f8f9fa;
    color:#333;
    text-align:center;
}
.container{
    max-width:420px;
    padding:20px;
}
h1{
    font-size:7rem;
    color:#ff9800;
    margin-bottom:10px;
}
p{
    font-size:1.15rem;
    margin-bottom:25px;
    color:#555;
}
a{
    display:inline-block;
    padding:12px 25px;
    background:#4a90e2;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    transition:.3s;
}
a:hover{
    background:#357ab8;
}
small{
    display:block;
    margin-top:15px;
    color:#888;
}
.count{
    font-weight:bold;
    color:#ff9800;
}
</style>
</head>

<body>
<div class="container">
    <h1>403</h1>
    <p>You don’t have permission to access this page.</p>
    <a href="https://www.tfoepe-inc.com.ph">Go to Homepage</a>
    <small>Redirecting in <span class="count" id="countdown">3</span> seconds…</small>
</div>

<script>
let seconds = 3;
const countdownEl = document.getElementById("countdown");

const timer = setInterval(() => {
    seconds--;
    countdownEl.textContent = seconds;

    if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = "https://www.tfoepe-inc.com.ph";
    }
}, 1000);
</script>
</body>
</html>
